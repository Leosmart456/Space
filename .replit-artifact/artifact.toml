kind = "web"
previewPath = "/"
title = "SpaceX Pre-IPO Platform"
version = "1.0.0"
id = "artifacts/spacex-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23327

[services.development]
run = "pnpm --filter @workspace/spacex-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spacex-platform", "run", "build" ]
publicDir = "artifacts/spacex-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23327"
BASE_PATH = "/"
